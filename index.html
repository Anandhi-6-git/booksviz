<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Goodreads Scatter Plots</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
body{font-family:'Segoe UI','Roboto',sans-serif;background:#fafafa;color:#111;margin:0}
.chart{width:100%;height:350px}
.axis path{display:none}
.axis line{stroke:#ccc;stroke-dasharray:2,2}
.tip{position:absolute;pointer-events:none;background:#fff;border:1px solid #ccc;padding:3px 6px;font-size:12px}
footer{text-align:center;margin:20px;font-size:14px}
</style>
</head>
<body>
<div id="plot1" class="chart"></div>
<div id="plot2" class="chart"></div>
<div id="plot3" class="chart"></div>
<footer>Visualization by Codex. Data from <a href="https://github.com/zygmuntz/goodbooks-10k">Goodreads</a></footer>
<script>
fetch('scatter_data.json').then(r=>r.json()).then(d=>{
 d.forEach(o=>{o.pages=+o.pages;o.blurb=+o.blurb;o.reviews=+o.reviews;o.rating=+o.rating;o.logReviews=Math.log10(o.reviews+1)});
 const plots=[
  {id:'#plot1',x:o=>o.pages,label:'Pages'},
  {id:'#plot2',x:o=>o.blurb,label:'Blurb Length'},
  {id:'#plot3',x:o=>o.logReviews,label:'log10(Reviews)'}
 ];
 plots.forEach(p=>makePlot(p.id,p.x,o=>o.rating,p.label));
 function lowess(xs,ys,f=0.3,n=200){
  const min=d3.min(xs),max=d3.max(xs),r=max-min,arr=[];
  for(let i=0;i<n;i++){
   const x0=min+r*i/(n-1);
   const d=xs.map(x=>Math.abs(x-x0));
   const h=d3.quantile([...d].sort((a,b)=>a-b),f);
   const w=d.map(v=>{const u=Math.abs(v/h);return u>=1?0:Math.pow(1-u*u*u,3)});
   let sw=0,sx=0,sy=0,sxx=0,sxy=0;
   for(let j=0;j<xs.length;j++){const ww=w[j];const x=xs[j],y=ys[j];sw+=ww;sx+=ww*x;sy+=ww*y;sxx+=ww*x*x;sxy+=ww*x*y;}
   const mx=sx/sw,my=sy/sw,b=(sxy-sx*my)/(sxx-sx*mx);arr.push([x0,my+b*(x0-mx)]);
  }
  return arr;
 }
 function makePlot(sel,xf,yf,label){
  const m={t:20,r:20,b:40,l:50};
  const svg=d3.select(sel).append('svg');
  const tip=d3.select('body').append('div').attr('class','tip');
  function draw(){
   const w=svg.node().parentNode.clientWidth-m.l-m.r;
   const h=350-m.t-m.b;
   svg.attr('width',w+m.l+m.r).attr('height',h+m.t+m.b);
   const g=svg.html('').append('g').attr('transform',`translate(${m.l},${m.t})`);
   const x=d3.scaleLinear().domain(d3.extent(d,xf)).nice().range([0,w]);
   const y=d3.scaleLinear().domain(d3.extent(d,yf)).nice().range([h,0]);
   g.append('g').attr('class','x axis').attr('transform',`translate(0,${h})`).call(d3.axisBottom(x).ticks(6).tickSize(-h));
   g.append('g').attr('class','y axis').call(d3.axisLeft(y).ticks(6).tickSize(-w));
   g.append('g').selectAll('circle').data(d).join('circle')
     .attr('cx',o=>x(xf(o))).attr('cy',o=>y(yf(o))).attr('r',6).attr('fill','steelblue').attr('opacity',0.2)
     .on('mousemove',(e,o)=>tip.style('opacity',1).html(`${label}: ${xf(o)}<br>Rating: ${yf(o)}`).style('left',e.pageX+5+'px').style('top',e.pageY-28+'px'))
     .on('mouseout',()=>tip.style('opacity',0));
   const line=d3.line().x(d=>x(d[0])).y(d=>y(d[1]));
   g.append('path').datum(lowess(d.map(xf),d.map(yf))).attr('fill','none').attr('stroke','orange').attr('stroke-width',2).attr('d',line);
  }
  draw();
  window.addEventListener('resize',draw);
 }
});
</script>
</body>
</html>
